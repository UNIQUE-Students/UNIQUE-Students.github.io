- fullname: Charlotte Volk
  email: charlotte.volk@mail.mcgill.ca
  photo: charlotte_volk.jpg
  affiliation: "McGill University and Mila"
  bio: "I'm a PhD student in Computer Science at McGill and Mila, co-supervised by Blake Richards and Shahab Bakhtiari. My interests lie broadly in NeuroAI and human learning processes, and I work on biologically inspired learning algorithms. Right now, I'm working on developing predictive coding algorithms that are more closely mapped to cortical microcircuits and can process complex data modalities."
  committee: Co-Chair of the SAC
  alttext: none
  pronouns: she/her

- fullname: Cornelius Crijnen
  email: cornelius.crijnen@mail.mcgill.ca
  photo: cornelius_crijnen.jpeg
  affiliation: "McGill University and Mila"
  bio: "I’m a PhD student in Electrical and Computer Engineering at McGill University and Mila, supervised by Professor Tal Arbel. My research focuses on deep learning and generative modeling for medical imaging, particularly self-supervised and diffusion-based methods for neurological diseases such as multiple sclerosis and Alzheimer’s."
  committee: Technical Lead
  alttext: none
  pronouns: he/him
  website: https://ccrijnen.github.io/

- fullname: Elizaveta Sycheva
  email: elizaveta.sycheva@umontreal.ca
  photo: elizaveta_sycheva.jpeg
  affiliation: "Université de Montréal"
  bio: "I'm a Master's student in Computational Medicine supervised by Professors Franco Lepore and Shahab Bakhtiari. My research focuses on audiovisual multisensory integration and how the brain combines information from different senses to guide perception and decision-making. I use computational and statistical modeling to characterize the dynamics of this process and to better understand how factors such as expectations and sensory reliability shape perceptual behavior."
  committee: Event Coordinator
  alttext: none
  pronouns: she/her

- fullname: Emmanuelle Coutu-Nadeau
  email: emmanuelle.coutu-nadeau@umontreal.ca
  photo: emmanuelle_coutu-nadeau.jpeg
  affiliation: "Université de Montréal"
  bio: "Emmanuelle Coutu-Nadeau (M.Sc. Candidate, University of Montreal) specializes in the intersection of artificial intelligence and developmental psychology. Under the supervision of Dr. Sarah Lippé, she develops AI-driven analytical pipelines for EEG data to enhance the diagnostic precision of Autism Spectrum Disorder and ADHD. She holds two undergraduate degrees from McGill University, in Software Engineering and Psychology, and has worked in digital health at CareSimple as a software developer and later as a project manager. Emmanuelle is also a mentor for Technovation Montreal, where she supports girls aged 8 to 18 in creating mobile applications with social impact. Her background reflects a unique expertise at the intersection of technology, health, and psychology."
  committee: Content Manager
  alttext: none
  pronouns: she/her
  website: https://emmanuellecoutunadeau.com/

- fullname: Laurence Lessard
  email: laurence.lessard.4@umontreal.ca
  photo: laurence_lessard.jpg
  affiliation: "Université de Montréal"
  bio: "I'm a Master's student in Psychology at Université de Montréal, specializing in Cognitive and Computational Neuroscience. My current work focuses on how visual perception and mental imagery share a similar representational format. I am interested more generally in the inner world of the mind and what is shaping each individual's unique way of perceiving and imagining."
  committee: Liaison to the Equity, Diversity, and Inclusion Committee
  alttext: none
  pronouns: she/her
  website: https://www.linkedin.com/in/laurence-lessard/

- fullname: Hugo Delhaye
  email: hugo.delhaye@umontreal.ca
  photo: hugo_delhaye.jpg
  affiliation: "Université de Montréal"
  bio: "I am a Master’s student in Psychology at Université de Montréal, co-supervised by Lune Bellec and Audrey Durand. My research combines behavioral data, artificial intelligence models, and video game simulations to compare how humans and artificial agents explore and learn from their environments."
